
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Todo App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #818cf8;
        --danger: #f87171;
        --success: #4ade80;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg), #1e293b);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 22px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        overflow: hidden;
      }

      .hero {
        padding: 24px 28px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #0f172a;
      }

      .hero h1 { margin: 0 0 6px; font-size: 28px; }
      .hero p { margin: 0; font-size: 14px; }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 20px;
        padding: 24px;
      }

      .card {
        background: var(--panel);
        border-radius: 16px;
        padding: 18px;
        border: 1px solid rgba(255,255,255,0.06);
      }

      .card h2 { margin-top: 0; font-size: 20px; }

      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      label { font-size: 13px; color: var(--muted); }
      input {
        border: 1px solid rgba(255,255,255,0.1);
        background: var(--panel-2);
        color: var(--text);
        padding: 11px 12px;
        border-radius: 10px;
        outline: none;
      }

      input:focus { border-color: var(--accent); }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: bold;
      }

      .primary { background: var(--accent); color: #06111f; }
      .secondary { background: #334155; color: var(--text); }
      .danger { background: var(--danger); color: white; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .status {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        min-height: 42px;
        font-size: 14px;
      }
      .status.success { background: rgba(74, 222, 128, 0.16); color: var(--success); }
      .status.error { background: rgba(248, 113, 113, 0.15); color: #fecaca; }

      .user-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
      .user-item {
        background: var(--panel-2);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .user-info { cursor: pointer; }
      .user-name { font-weight: 700; }
      .user-email { color: var(--muted); font-size: 13px; margin-top: 3px; }
      .user-actions { display: flex; gap: 8px; }

      @media (max-width: 800px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="hero">
        <h1>CRUD Todo App</h1>
        <p>Create, view, update, and delete user entries from your backend API.</p>
      </div>

      <div class="grid">
        <section class="card">
          <h2>User Form</h2>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" placeholder="Enter full name" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter email" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" />
          </div>

          <div class="actions">
            <button id="submitBtn" class="primary">Add User</button>
            <button id="clearBtn" class="secondary">Clear</button>
            <button id="deleteBtn" class="danger" disabled>Delete</button>
          </div>

          <div id="status" class="status"></div>
        </section>

        <section class="card">
          <h2>Users</h2>
          <ul id="userList" class="user-list"></ul>
        </section>
      </div>
    </div>

    <script>
      const state = { selectedEmail: '', apiBase: '' };
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const clearBtn = document.getElementById('clearBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const statusEl = document.getElementById('status');
      const userListEl = document.getElementById('userList');

      function setStatus(message, type = 'success') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
      }

      function resetForm() {
        nameInput.value = '';
        emailInput.value = '';
        passwordInput.value = '';
        state.selectedEmail = '';
        submitBtn.textContent = 'Add User';
        deleteBtn.disabled = true;
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.message || 'Request failed');
        }

        return data;
      }

      async function resolveApiBase() {
        if (state.apiBase) {
          return state.apiBase;
        }

        const candidates = [
          'http://localhost:3000/auth/api',
          'http://localhost:3000/api/auth',
          '/auth/api',
          '/api/auth',
        ];

        for (const base of candidates) {
          try {
            const data = await requestJson(`${base}/users`);
            state.apiBase = base;
            return base;
          } catch (error) {
            console.warn(`Could not reach ${base}`);
          }
        }

        state.apiBase = 'http://localhost:4000/api/auth/users';
        return state.apiBase;
      }

      async function loadUsers() {
        try {
          const base = await resolveApiBase();
          const data = await requestJson(`${base}/users`);
          renderUsers(data);
        } catch (error) {
          setStatus(error.message, 'error');
        }
      }

      function renderUsers(users) {
        if (!Array.isArray(users) || users.length === 0) {
          userListEl.innerHTML = '<li class="user-item">No users found.</li>';
          return;
        }

        userListEl.innerHTML = users.map((user) => `
          <li class="user-item">
            <div class="user-info" data-email="${user.email}">
              <div class="user-name">${user.name}</div>
              <div class="user-email">${user.email}</div>
            </div>
            <div class="user-actions">
              <button class="secondary view-btn" data-email="${user.email}">View</button>
            </div>
          </li>
        `).join('');
      }

      async function viewUser(email) {
        try {
          const base = await resolveApiBase();
          const data = await requestJson(`${base}/user?email=${encodeURIComponent(email)}`);
          const user = Array.isArray(data) ? data[0] : data;

          nameInput.value = user.name || '';
          emailInput.value = user.email || '';
          passwordInput.value = user.password || '';
          state.selectedEmail = user.email;
          submitBtn.textContent = 'Update User';
          deleteBtn.disabled = false;
          setStatus(`Loaded ${user.email}`, 'success');
        } catch (error) {
          setStatus(error.message, 'error');
        }
      }

      async function submitUser() {
        const payload = {
          name: nameInput.value.trim(),
          email: emailInput.value.trim(),
          password: passwordInput.value.trim(),
        };

        if (!payload.name || !payload.email || !payload.password) {
          setStatus('Please fill all fields.', 'error');
          return;
        }

        try {
          const base = await resolveApiBase();
          const endpoint = state.selectedEmail ? `${base}/${encodeURIComponent(state.selectedEmail)}` : `${base}/adduser`;
          const method = state.selectedEmail ? 'PATCH' : 'POST';
          const data = await requestJson(endpoint, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          setStatus(state.selectedEmail ? 'User updated successfully.' : 'User added successfully.', 'success');
          resetForm();
          await loadUsers();
        } catch (error) {
          setStatus(error.message, 'error');
        }
      }

      async function deleteUser() {
        if (!state.selectedEmail) {
          return;
        }

        try {
          const base = await resolveApiBase();
          const data = await requestJson(`${base}/deleteuser`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: state.selectedEmail }),
          });

          setStatus('User deleted successfully.', 'success');
          resetForm();
          await loadUsers();
        } catch (error) {
          setStatus(error.message, 'error');
        }
      }

      submitBtn.addEventListener('click', submitUser);
      clearBtn.addEventListener('click', () => {
        resetForm();
        setStatus('Form cleared.', 'success');
      });
      deleteBtn.addEventListener('click', deleteUser);

      userListEl.addEventListener('click', async (event) => {
        const button = event.target.closest('.view-btn');
        if (button) {
          await viewUser(button.dataset.email);
          return;
        }

        const info = event.target.closest('.user-info');
        if (info) {
          await viewUser(info.dataset.email);
        }
      });

      resetForm();
      loadUsers();
    </script>
  </body>
</html>
